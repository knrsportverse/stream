<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KNR SPORTVERSE - STREAM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#000;height:100%;overflow:hidden}
.shaka-video-container{position:absolute;inset:0}
video{width:100%;height:100%;object-fit:contain}
.chat-toggle{position:absolute;right:16px;top:50%;transform:translateY(-50%);width:52px;height:52px;border-radius:50%;border:none;background:#1976d2;color:#fff;z-index:9999;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.4);transition:.3s}
.chat-toggle.hide{display:none}
.chat-toggle svg{width:26px;height:26px;fill:#fff}
.chat-panel{position:absolute;top:0;right:-360px;width:360px;max-width:90vw;height:100%;background:#111;display:flex;flex-direction:column;transition:right .3s;z-index:9999;border-left:1px solid #333}
.chat-panel.open{right:0}
.chat-header{height:52px;background:#1d1d1d;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 12px}
.chat-close{background:none;border:none;cursor:pointer}
.chat-close svg{width:22px;height:22px;fill:#fff}
.chat-panel iframe{flex:1;border:none;width:100%}
</style>
</head>
<body>
<div class="shaka-video-container" data-shaka-player>
<video autoplay muted playsinline></video>

<button id="chatToggle" class="chat-toggle" aria-label="Open chat">
<svg viewBox="0 0 24 24"><path d="M4 4h16a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H8l-4 4V6a2 2 0 0 1 2-2z"/></svg>
</button>

<div id="chatPanel" class="chat-panel">
<div class="chat-header">
<span>Live Chat</span>
<button id="closeChat" class="chat-close">
<svg viewBox="0 0 24 24"><path d="M18.3 5.71 12 12l6.3 6.29-1.41 1.41L10.59 13.4 4.29 19.7 2.88 18.29 9.17 12 2.88 5.71 4.29 4.3l6.3 6.29 6.29-6.29z"/></svg>
</button>
</div>
<iframe src="https://knrsportverse.blogspot.com/p/knr-live-chat.html"></iframe>
</div>
</div>

<script>
document.addEventListener('DOMContentLoaded',async()=>{
shaka.polyfill.installAll();
const video=document.querySelector('video');
const player=new shaka.Player();
await player.attach(video);
const container=document.querySelector('.shaka-video-container');
const ui=new shaka.ui.Overlay(player,container,video);
ui.configure({controlPanelElements:['play_pause','mute','volume','time_and_duration','spacer','language','captions','picture_in_picture','quality','fullscreen']});
player.configure({drm:{clearKeys:{"14eeabf30c14b7fbf3008c03099ce011":"17d2ac8dbc5429bd70af3433aa12158d"}}});
await player.load("https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/w0rehjjrwe/out/v1/69a2a7041395406b970598f61680e7cf/cenc.mpd");
video.play().catch(()=>{});

const btn=document.getElementById("chatToggle");
const panel=document.getElementById("chatPanel");
const close=document.getElementById("closeChat");
btn.onclick=()=>{panel.classList.add("open");btn.classList.add("hide");};
close.onclick=()=>{panel.classList.remove("open");btn.classList.remove("hide");};

let t;
function showOverlay(){
 if(!panel.classList.contains("open")){btn.style.opacity="1";btn.style.pointerEvents="auto";}
 panel.style.opacity="1";
 clearTimeout(t);
 t=setTimeout(()=>{
   btn.style.opacity="0";btn.style.pointerEvents="none";
   panel.style.opacity="0";
 },3000);
}
container.addEventListener("mousemove",showOverlay);
container.addEventListener("touchstart",showOverlay);
showOverlay();
});
</script>
</body></html>

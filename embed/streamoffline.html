<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Not Started Yet</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

/* 16:9 Blue Gradient Panel */
.stream-box{
    width:100vw;
    aspect-ratio:16 / 9;

    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background:linear-gradient(
        135deg,
        #00113a 0%,
        #0057ff 30%,
        #00aaff 65%,
        #00113a 100%
    );

    position:relative;
}

/* Animated shine */
.stream-box::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:linear-gradient(
        120deg,
        transparent 40%,
        rgba(255,255,255,.12) 50%,
        transparent 60%
    );
    animation:shine 6s linear infinite;
}

@keyframes shine{
    from{
        transform:translateX(-100%) rotate(20deg);
    }
    to{
        transform:translateX(100%) rotate(20deg);
    }
}

/* Main Text */
.stream-text{
    position:relative;
    z-index:2;

    font-size:clamp(36px,5vw,84px);
    font-weight:900;
    line-height:1.15;
    text-align:center;
    text-transform:uppercase;
    letter-spacing:3px;

    background:linear-gradient(
        90deg,
        #ffffff,
        #dff6ff,
        #8fdcff,
        #38b6ff,
        #ffffff
    );

    background-size:200% auto;

    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:
        0 0 10px rgba(255,255,255,.15),
        0 0 20px rgba(0,140,255,.35);

    animation:
        swipeDown 1s ease-out,
        gradientMove 4s linear infinite;
}

/* Bottom Query Text */
.bottom-text{
    position:absolute;
    bottom:35px;
    left:50%;
    transform:translateX(-50%);

    display:none;
    z-index:2;

    width:90%;

    font-size:clamp(20px,2.5vw,40px);
    font-weight:900;
    text-align:center;
    text-transform:uppercase;
    letter-spacing:2px;

    /* NEW GOLD/ORANGE GRADIENT */
    background:linear-gradient(
        90deg,
        #fff8d6 0%,
        #ffe082 20%,
        #ffc107 40%,
        #ff9800 60%,
        #ffd54f 80%,
        #fff8d6 100%
    );

    background-size:200% auto;

    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:
        0 0 8px rgba(255,193,7,.45),
        0 0 18px rgba(255,152,0,.55),
        0 0 28px rgba(255,255,255,.15);

    animation:
        swipeUp 1s ease-out,
        gradientMove 4s linear infinite;
}

@keyframes swipeDown{
    0%{
        opacity:0;
        transform:translateY(-140px);
        filter:blur(10px);
    }
    70%{
        opacity:1;
        transform:translateY(15px);
        filter:blur(2px);
    }
    100%{
        opacity:1;
        transform:translateY(0);
        filter:blur(0);
    }
}

@keyframes swipeUp{
    0%{
        opacity:0;
        transform:translate(-50%,120px);
        filter:blur(10px);
    }
    70%{
        opacity:1;
        transform:translate(-50%,-10px);
        filter:blur(2px);
    }
    100%{
        opacity:1;
        transform:translate(-50%,0);
        filter:blur(0);
    }
}

@keyframes gradientMove{
    from{
        background-position:0% center;
    }
    to{
        background-position:200% center;
    }
}

/* Responsive */
@media (max-width:768px){
    .stream-text{
        font-size:clamp(24px,6vw,48px);
        letter-spacing:1px;
        padding:0 20px;
    }

    .bottom-text{
        font-size:clamp(16px,4vw,28px);
        bottom:20px;
        letter-spacing:1px;
    }
}
</style>

</head>
<body>

<div class="stream-box">

    <div class="stream-text">
        STREAM NOT STARTED YET<br>
        OR ENDED!
    </div>

    <div class="bottom-text" id="bottomText"></div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const queryText = params.get("q");

if (queryText && queryText.trim() !== "") {
    const bottomText = document.getElementById("bottomText");
    bottomText.textContent = decodeURIComponent(queryText);
    bottomText.style.display = "block";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KNR SPORTVERSE - STREAM</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 60'><defs><linearGradient id='grad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='%231D4ED8'/><stop offset='100%' stop-color='%2360A5FA'/></linearGradient></defs><rect x='4' y='4' width='52' height='52' rx='12' fill='url(%23grad)' stroke='white' stroke-width='1.5'/><text x='30' y='38' text-anchor='middle' font-family='Arial,sans-serif' font-size='22' font-weight='700' fill='white'>KNR</text></svg>">
  
  <!-- Shaka Player -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .shaka-video-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    video {
      width: 100%;
      height: 100%;
      background: #000;
      object-fit: contain;
    }

    .shaka-spinner-container,
    .shaka-spinner,
    .shaka-spinner-svg {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
    }

    /* Blue Controls & Icons */
    .shaka-controls-button,
    .shaka-overflow-button-label,
    .shaka-current-time,
    .shaka-time-container {
      color: dark-blue !important;
    }

    .shaka-controls-button svg path {
      fill: #1e90ff !important;
    }

    /* Logo overlay - Responsive */
    .video-logo {
      position: absolute;
      top: 10px;
      left: 10px;
      opacity: 0.8;
      z-index: 1000;
      transition: opacity 0.3s ease;
      width: clamp(50px, 12vw, 65px);
      height: auto;
      aspect-ratio: 65/20;
    }

    @media (min-width: 768px) {
      .video-logo {
        width: clamp(65px, 8vw, 80px);
        top: 15px;
        left: 15px;
      }
    }

    @media (min-width: 1200px) {
      .video-logo {
        width: clamp(80px, 6vw, 100px);
        top: 20px;
        left: 20px;
      }
    }

    @media (max-width: 480px) {
      .video-logo {
        width: clamp(40px, 10vw, 50px);
        top: 8px;
        left: 8px;
      }
    }

    @media (max-width: 320px) {
      .video-logo {
        width: clamp(30px, 8vw, 40px);
        top: 5px;
        left: 5px;
      }
    }

    .video-logo:hover {
      opacity: 1;
    }

    /* ===== CHAT BUTTON & PANEL STYLES ===== */
    
    /* Chat Button - Positioned above controls */
    .chat-button {
      position: fixed;
      bottom: 85px;
      right: 15px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(30, 30, 30, 0.85);
      border: 2px solid rgba(255, 255, 255, 0.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .chat-button:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.6);
      transform: scale(1.1);
    }

    .chat-button:active {
      transform: scale(0.95);
    }

    .chat-button svg {
      width: 24px;
      height: 24px;
      fill: white;
      filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.5));
    }

    /* Chat Panel */
    .chat-panel {
      position: fixed;
      right: -360px;
      top: 0;
      width: 320px;
      height: 100vh;
      background: rgba(20, 20, 20, 0.95);
      border-left: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 998;
      transition: right 0.3s ease;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(10px);
    }

    .chat-panel.open {
      right: 0;
    }

    /* Chat Header */
    .chat-header {
      padding: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .chat-header h3 {
      color: white;
      font-size: 14px;
      font-weight: 600;
    }

    .chat-close-btn {
      background: none;
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      transition: opacity 0.2s;
    }

    .chat-close-btn:hover {
      opacity: 0.7;
    }

    /* Chat Content (iframe container) */
    .chat-content {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .chat-content iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: rgba(10, 10, 10, 0.8);
    }

    /* Fullscreen Mode - Adjust button position */
    .shaka-video-container:fullscreen .chat-button,
    video:fullscreen ~ .chat-button {
      bottom: 85px;
      right: 15px;
      z-index: 9999;
    }

    .shaka-video-container:fullscreen .chat-panel,
    video:fullscreen ~ .chat-panel {
      z-index: 9998;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .chat-button {
        bottom: 70px;
        right: 10px;
        width: 44px;
        height: 44px;
      }

      .chat-button svg {
        width: 20px;
        height: 20px;
      }

      .chat-panel {
        width: 100%;
        right: -100%;
      }

      .chat-panel.open {
        right: 0;
      }
    }

    @media (max-width: 480px) {
      .chat-button {
        bottom: 60px;
        right: 8px;
        width: 40px;
        height: 40px;
      }

      .chat-button svg {
        width: 18px;
        height: 18px;
      }

      .chat-header h3 {
        font-size: 12px;
      }
    }

    /* Overlay for mobile when chat is open */
    @media (max-width: 768px) {
      .chat-panel.open::before {
        content: '';
        position: fixed;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.3);
        z-index: -1;
      }
    }
  </style>
</head>

<body>
  <div class="shaka-video-container" data-shaka-player>
    <video autoplay muted playsinline preload="metadata" poster="">
    </video>
  </div>

  <!-- Chat Button -->
  <button class="chat-button" id="chatBtn" title="Open Live Chat">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
    </svg>
  </button>

  <!-- Chat Panel -->
  <div class="chat-panel" id="chatPanel">
    <div class="chat-header">
      <h3>Live Chat</h3>
      <button class="chat-close-btn" id="chatClose">&times;</button>
    </div>
    <div class="chat-content">
      <iframe src="https://knrsportverse.blogspot.com/p/knr-live-chat.html" allowfullscreen="true" allow="microphone; camera"></iframe>
    </div>
  </div>

  <script>
    // Chat functionality
    const chatBtn = document.getElementById('chatBtn');
    const chatPanel = document.getElementById('chatPanel');
    const chatClose = document.getElementById('chatClose');

    chatBtn.addEventListener('click', () => {
      chatPanel.classList.toggle('open');
    });

    chatClose.addEventListener('click', () => {
      chatPanel.classList.remove('open');
    });

    // Close chat panel on mobile when clicking outside
    document.addEventListener('click', (e) => {
      if (window.innerWidth <= 768) {
        if (!chatPanel.contains(e.target) && !chatBtn.contains(e.target)) {
          chatPanel.classList.remove('open');
        }
      }
    });

    // Handle fullscreen changes
    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) {
        // Exited fullscreen
        chatPanel.classList.remove('open');
      }
    });

    // Close chat on ESC key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        chatPanel.classList.remove('open');
      }
    });

    // Player initialization
    document.addEventListener('DOMContentLoaded', async () => {
      shaka.polyfill.installAll();

      if (!shaka.Player.isBrowserSupported()) {
        console.error('Browser not supported');
        return;
      }

      const video = document.querySelector('video');
      const player = new shaka.Player();
      await player.attach(video);

      const container = document.querySelector('.shaka-video-container');
      const ui = new shaka.ui.Overlay(player, container, video);

      ui.configure({
        controlPanelElements: [
          'play_pause', 'mute', 'volume', 'time_and_duration',
          'spacer', 'language', 'captions', 'picture_in_picture',
          'quality', 'fullscreen'
        ],
        volumeBarColors: {
          base: 'rgba(135, 206, 235, 0.35)',
          level: 'rgb(255,255,255)'
        },
        seekBarColors: {
          base: 'rgba(50, 55, 61)',
          buffered: 'rgba(135, 206, 235, 0.6)',
          played: 'rgb(255, 255, 255)'
        }
      });

      const drmConfig = {
        clearKeys: {
          "1c6bfd8d1cdd4df69ea5fc4dd2f025bb": "b6fd90027dac7a94a9461f8b2638cbb4"
        }
      };

      let streamUrl = "https://dmbgaz4xf6jyh.cloudfront.net/live-stream-dai/69690cfcce0dc031830e7c1a/123a264b71764485bd49eca2d552cf33/d97743de3620a865848fff7a9de14dda1bf2409d/session/3200a220-9ac8-4aef-9696-29c0c79b3d98/manifest.mpd?aid=688aae6d61c87d6274c05065&dnt=true&access_token=63ey9SOpQeHBRfWJYQLXQjelQc0QM1HXmlHp4iZrH8UCOCM8QtGIGg1sEEPJH0R0yXktUEXdLeB&uid=Knx65GY6UbaWSADZybEvf6m5MvqNIuNs&sid=bwRy9BgSc4RFeVhYh52hVIY8uPsJ4v4d&pid=A0xT1VnepBvKKqyeyRNtNkZBmHBrNNZM&ref=ditu.caracoltv.com&ext_pb=0&es=dmbgaz4xf6jyh.cloudfront.net&proto=https&pz=us&xr=us-east-2&manifestfilter=video_height:480-1080";

      player.configure({
        drm: drmConfig,
        streaming: {
          lowLatencyMode: true,
          bufferingGoal: 15,
          rebufferingGoal: 2,
          bufferBehind: 15,
          retryParameters: {
            timeout: 10000,
            maxAttempts: 5,
            baseDelay: 300,
            backoffFactor: 1.2
          },
          segmentRequestTimeout: 8000,
          segmentPrefetchLimit: 2,
          useNativeHlsOnSafari: true
        },
        manifest: {
          retryParameters: { timeout: 8000, maxAttempts: 3 }
        }
      });

      player.addEventListener('error', (event) => {
        console.error('Shaka Player Error:', event.detail);
      });

      try {
        await player.load(streamUrl);
        console.log("Stream loaded successfully");

        video.muted = true;
        const playPromise = video.play();
        if (playPromise !== undefined) {
          playPromise.catch(err => console.log("Autoplay blocked:", err));
        }

      } catch (error) {
        console.error('Load error:', error);
      }

      // Unmute on first click
      document.addEventListener('click', () => {
        if (video.muted) {
          video.muted = false;
          video.volume = 1;
        }
      }, { once: true });
    });
  </script>
</body>
</html>

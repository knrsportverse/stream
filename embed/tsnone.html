<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KNR SPORTVERSE - STREAM</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 60'><defs><linearGradient id='grad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%231E40AF;stop-opacity:1' /><stop offset='100%' style='stop-color:%233B82F6;stop-opacity:1' /></linearGradient></defs><rect x='5' y='5' width='50' height='50' rx='10' fill='url(%23grad)'/><text x='30' y='38' text-anchor='middle' font-family='Arial, sans-serif' font-size='24' font-weight='bold' fill='white'>CA</text></svg>">

  
  <!-- Shaka Player -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .shaka-video-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    video {
      width: 100%;
      height: 100%;
      background: #000;
      object-fit: contain;
    }

    .shaka-spinner-container,
    .shaka-spinner,
    .shaka-spinner-svg {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
    }

    /* Blue Controls & Icons */
    .shaka-controls-button,
    .shaka-overflow-button-label,
    .shaka-current-time,
    .shaka-time-container {
      color: dark-blue !important;
    }

    .shaka-controls-button svg path {
      fill: #1e90ff !important;
    }

/* Logo overlay - Responsive */
.video-logo {
  position: absolute;
  top: 10px;
  left: 10px;
  opacity: 0.8;
  z-index: 1000;
  transition: opacity 0.3s ease;
  /* Responsive sizing */
  width: clamp(50px, 12vw, 65px);
  height: auto;
  aspect-ratio: 65/20; /* Maintain original aspect ratio */
}

/* Desktop - larger screens */
@media (min-width: 768px) {
  .video-logo {
    width: clamp(65px, 8vw, 80px);
    top: 15px;
    left: 15px;
  }
}

/* Large desktop screens */
@media (min-width: 1200px) {
  .video-logo {
    width: clamp(80px, 6vw, 100px);
    top: 20px;
    left: 20px;
  }
}

/* Mobile - smaller screens */
@media (max-width: 480px) {
  .video-logo {
    width: clamp(40px, 10vw, 50px);
    top: 8px;
    left: 8px;
  }
}

/* Very small screens */
@media (max-width: 320px) {
  .video-logo {
    width: clamp(30px, 8vw, 40px);
    top: 5px;
    left: 5px;
  }
}

.video-logo:hover {
  opacity: 1;
}
  </style>
</head>

<body>
  <div class="shaka-video-container" data-shaka-player>
    <video autoplay muted playsinline preload="metadata" poster="">
    </video>

  
<!-- 🔻 Online Counter (hidden) -->


  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      shaka.polyfill.installAll();

      if (!shaka.Player.isBrowserSupported()) {
        console.error('Browser not supported');
        return;
      }

      const video = document.querySelector('video');
      const player = new shaka.Player();
      await player.attach(video);

      const container = document.querySelector('.shaka-video-container');
      const ui = new shaka.ui.Overlay(player, container, video);

      // Blue / Sky Controls
      ui.configure({
        controlPanelElements: [
          'play_pause', 'mute', 'volume', 'time_and_duration',
          'spacer', 'language', 'captions', 'picture_in_picture',
          'quality', 'fullscreen'
        ],
        volumeBarColors: {
          base: 'rgba(135, 206, 235, 0.35)',
          level: 'rgb(255,255,255)'
        },
        seekBarColors: {
          base: 'rgba(50, 55, 61)',
          buffered: 'rgba(135, 206, 235, 0.6)',
          played: 'rgb(255, 255, 255)'
        }
      });

      // DRM Config
      const drmConfig = {
                clearKeys: {
            "14eeabf30c14b7fbf3008c03099ce011": "17d2ac8dbc5429bd70af3433aa12158d"
          }
        };
        let cookieHeader = "";
        let streamUrl = "https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/w0rehjjrwe/out/v1/69a2a7041395406b970598f61680e7cf/cenc.mpd";


       
      player.configure({
        drm: drmConfig,
        streaming: {
          lowLatencyMode: true,
          bufferingGoal: 15,
          rebufferingGoal: 2,
          bufferBehind: 15,
          retryParameters: {
            timeout: 10000,
            maxAttempts: 5,
            baseDelay: 300,
            backoffFactor: 1.2
          },
          segmentRequestTimeout: 8000,
          segmentPrefetchLimit: 2,
          useNativeHlsOnSafari: true
        },
        manifest: {
          retryParameters: { timeout: 8000, maxAttempts: 3 }
        }
      });

      player.addEventListener('error', (event) => {
        console.error('Shaka Player Error:', event.detail);
      });

      try {
        await player.load(streamUrl);
        console.log("Stream loaded successfully");

        // 🔥 FORCE AUTOPLAY
        video.muted = true;
        const playPromise = video.play();
        if (playPromise !== undefined) {
          playPromise.catch(err => console.log("Autoplay blocked:", err));
        }

      } catch (error) {
        console.error('Load error:', error);
      }

      // Optional: Unmute on first click
      document.addEventListener('click', () => {
        if (video.muted) {
          video.muted = false;
          video.volume = 1;
        }
      }, { once: true });
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KNR SPORTVERSE - STREAM</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 60'><defs><linearGradient id='grad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='%231D4ED8'/><stop offset='100%' stop-color='%2360A5FA'/></linearGradient></defs><rect x='4' y='4' width='52' height='52' rx='12' fill='url(%23grad)' stroke='white' stroke-width='1.5'/><text x='30' y='38' text-anchor='middle' font-family='Arial,sans-serif' font-size='22' font-weight='700' fill='white'>KNR</text></svg>">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/css/all.min.css" crossorigin="anonymous">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .shaka-video-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    video {
      width: 100%;
      height: 100%;
      background: #000;
      object-fit: contain;
    }

    .shaka-spinner-container,
    .shaka-spinner,
    .shaka-spinner-svg {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
    }

    .error-badge {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: linear-gradient(135deg, #dc2626 0%, #ef4444 100%);
      color: white;
      padding: 20px 40px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      z-index: 500;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      display: none;
      max-width: 80%;
    }

    .error-badge.show {
      display: block;
    }

    .watermark {
      position: absolute;
      bottom: 5px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.6);
      font-size: 7px;
      font-weight: 600;
      letter-spacing: 1px;
      z-index: 1000;
      pointer-events: none;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
      white-space: nowrap;
    }

    .unmute-btn {
      position: absolute;
      top: 15px;
      left: 15px;
      background: rgba(30, 58, 138, 0.4);
      backdrop-filter: blur(10px);
      border: 1.5px solid rgba(96, 165, 250, 0.5);
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      cursor: pointer;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.3s ease;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .unmute-btn:hover {
      background: rgba(30, 58, 138, 0.6);
      border-color: rgba(96, 165, 250, 0.7);
    }

    .unmute-btn.hidden {
      display: none;
    }

    .unmute-btn i {
      font-size: 16px;
    }

    @media (max-width: 480px) {
      .unmute-btn {
        top: 10px;
        left: 10px;
        padding: 10px 18px;
        font-size: 13px;
        gap: 8px;
        border-radius: 50px;
      }

      .unmute-btn i {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="shaka-video-container" data-shaka-player>
    <video autoplay muted playsinline preload="metadata" poster=""></video>
    
    <button class="unmute-btn" id="unmuteBtn" title="Click to Unmute">
      <i class="fas fa-volume-high"></i>
      <span>Click to Unmute</span>
    </button>
    
    <div class="watermark">WEBSITE: KNR SPORTVERSE</div>
    
    <div class="error-badge" id="errorBadge"></div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, query, where, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBII2OvFCMb2ZbtrUj_2DrhexUcU3TxSS0",
      authDomain: "knrstream-47104.firebaseapp.com",
      projectId: "knrstream-47104",
      storageBucket: "knrstream-47104.firebasestorage.app",
      messagingSenderId: "390036335226",
      appId: "1:390036335226:web:38584b0002f224021369c3",
      measurementId: "G-QD8RDB9CGC"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const errorBadge = document.getElementById('errorBadge');
    const unmuteBtn = document.getElementById('unmuteBtn');
    let firstUnmuteOccurred = false;

    const params = new URLSearchParams(window.location.search);
    const streamId = params.get('q');

    if (!streamId) {
      showError('No stream ID provided. Use ?q=stream_id');
      throw new Error('No stream ID');
    }

    async function loadStream() {
      try {
        const q = query(collection(db, 'streams'), where('stream_id', '==', streamId));
        const querySnapshot = await getDocs(q);

        if (querySnapshot.empty) {
          showError(`Stream "${streamId}" not found`);
          return;
        }

        const streamData = querySnapshot.docs[0].data();
        const mpd_url = streamData.mpd_url;
        const drm_keys = streamData.drm_keys;

        shaka.polyfill.installAll();

        if (!shaka.Player.isBrowserSupported()) {
          showError('Browser not supported');
          return;
        }

        const video = document.querySelector('video');
        const player = new shaka.Player();
        await player.attach(video);

        const container = document.querySelector('.shaka-video-container');
        const ui = new shaka.ui.Overlay(player, container, video);

        ui.configure({
          controlPanelElements: [
            'time_and_duration',
            'spacer',
            'mute',
            'language',
            'captions',
            'picture_in_picture',
            'quality',
            'fullscreen'
          ]
        });

        const drmConfig = {
          clearKeys: drm_keys
        };

        player.configure({
          drm: drmConfig,
          streaming: {
            lowLatencyMode: true,
            bufferingGoal: 15,
            rebufferingGoal: 2,
            bufferBehind: 15,
            retryParameters: {
              timeout: 10000,
              maxAttempts: 5,
              baseDelay: 300,
              backoffFactor: 1.2
            },
            segmentRequestTimeout: 8000,
            segmentPrefetchLimit: 2,
            useNativeHlsOnSafari: true
          },
          manifest: {
            retryParameters: { timeout: 8000, maxAttempts: 3 }
          }
        });

        player.addEventListener('error', (event) => {
          console.error('Shaka Player Error:', event.detail);
          showError('Error: ' + (event.detail.message || 'Failed to load stream'));
        });

        await player.load(mpd_url);

        video.muted = true;
        const playPromise = video.play();
        if (playPromise !== undefined) {
          playPromise.catch(err => console.log("Autoplay blocked:", err));
        }

        unmuteBtn.addEventListener('click', handleUnmute);

      } catch (error) {
        console.error('Error:', error);
        showError('Failed to load stream: ' + error.message);
      }
    }

    function handleUnmute() {
      if (!firstUnmuteOccurred) {
        const video = document.querySelector('video');
        video.muted = false;
        video.volume = 1;
        firstUnmuteOccurred = true;
        unmuteBtn.classList.add('hidden');
      }
    }

    function showError(message) {
      errorBadge.classList.add('show');
      errorBadge.innerHTML = `<div>KNR SPORTVERSE</div><div style="font-size: 12px; opacity: 0.9; margin-top: 8px;">${message}</div>`;
    }

    document.addEventListener('DOMContentLoaded', loadStream);
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Embed Viewer</title>
    <style>
        * { margin: 0; padding: 0; }
        body { background: #1a1a1a; font-family: Arial; }
        .container { width: 100%; height: 100vh; display: flex; flex-direction: column; }
        iframe { flex: 1; border: none; }
        .error { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; background: #2d2d2d; color: #fff; text-align: center; font-size: 16px; }
        .input-box { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; background: #1a1a1a; }
        .input-container { background: #2d2d2d; padding: 40px; border-radius: 10px; text-align: center; }
        .input-container h2 { color: #fff; margin-bottom: 20px; }
        .input-container input { width: 400px; padding: 12px; font-size: 14px; border: 2px solid #444; border-radius: 5px; color: #fff; background: #1a1a1a; }
        .input-container input:focus { outline: none; border-color: #0084ff; }
        .input-container button { padding: 12px 30px; margin-left: 10px; background: #0084ff; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
        .input-container button:hover { background: #0073e6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="input-box" id="inputBox">
            <div class="input-container">
                <h2>Enter Stream URL</h2>
                <input type="text" id="urlInput" placeholder="https://example.com/stream" />
                <button onclick="encodeAndLoad()">Load</button>
            </div>
        </div>
        <iframe id="viewer" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="display: none;"></iframe>
    </div>

    <script>
        // ============ POPUP & REDIRECT BLOCKING ============
        let isPlayingVideo = false;
        const originalOpen    = window.open;
        const originalAlert   = window.alert;
        const originalConfirm = window.confirm;

        function activateAdBlocker() {
            isPlayingVideo = true;
            window.open = () => { console.log('Pop-up blocked by parent'); return null; };
            document.addEventListener('click', blockExternalNavigation, true);
        }

        function deactivateAdBlocker() {
            isPlayingVideo = false;
            window.open = originalOpen;
            document.removeEventListener('click', blockExternalNavigation, true);
        }

        function blockExternalNavigation(e) {
            if (!isPlayingVideo) return;
            const target = e.target.closest('a');
            if (target) {
                const href = target.getAttribute('href');
                const tgt  = target.getAttribute('target');
                if (tgt === '_blank' || tgt === '_top' || tgt === '_parent') {
                    e.preventDefault(); e.stopPropagation(); return false;
                }
                if (href && (href.startsWith('http') || href.startsWith('https') || href.startsWith('javascript:'))) {
                    e.preventDefault(); e.stopPropagation(); return false;
                }
            }
        }

        window.alert   = msg  => { if (isPlayingVideo) return;       return originalAlert(msg); };
        window.confirm = msg  => { if (isPlayingVideo) return false; return originalConfirm(msg); };
        // ===================================================

        function encodeAndLoad() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) {
                alert('Please enter a URL');
                return;
            }
            
            // Convert URL to base64
            const encoded = btoa(url);
            
            // Update address bar
            window.history.pushState({}, '', `?url=${encoded}`);
            
            // Load the stream
            loadStream(url);
        }

        function decodeUrl(encoded) {
            try {
                return atob(encoded);
            } catch (e) {
                return null;
            }
        }

        function loadStream(embedUrl) {
            const inputBox = document.getElementById('inputBox');
            const iframe = document.getElementById('viewer');
            
            inputBox.style.display = 'none';
            iframe.style.display = 'block';
            iframe.src = embedUrl;

            // Activate parent-level ad blocker
            activateAdBlocker();

            let loaded = false;
            iframe.onload = () => {
                loaded = true;
                
                // Block redirects and pop-ups INSIDE the iframe
                try {
                    const iframeWindow = iframe.contentWindow;
                    const iframeDoc = iframe.contentDocument || iframeWindow.document;

                    // Apply custom blockers to the iframe window
                    iframeWindow.open = () => { console.log('Iframe Pop-up blocked'); return null; };
                    iframeWindow.alert = () => { console.log('Iframe Alert blocked'); };
                    iframeWindow.confirm = () => { return false; };
                    
                    // Apply click listener inside the iframe
                    iframeDoc.addEventListener('click', blockExternalNavigation, true);
                    
                    // Original history blocks
                    iframeWindow.history.pushState = function() {};
                    Object.defineProperty(iframeWindow, 'location', { writable: false });
                    iframeWindow.onbeforeunload = null;

                    // Hide text and links in iframe
                    const style = iframeDoc.createElement('style');
                    style.textContent = `* { color: transparent !important; } a, button { pointer-events: none !important; }`;
                    iframeDoc.head.appendChild(style);
                    
                } catch (e) {
                    console.log('Cross-origin restrictions prevented deep iframe modification.', e);
                }
            };

            setTimeout(() => {
                if (!loaded) {
                    const proxyUrl = `https://cors.sh/?${encodeURIComponent(embedUrl)}`;
                    iframe.src = proxyUrl;
                }
            }, 5000);

            iframe.onerror = () => {
                const proxyUrl = `https://cors.sh/?${encodeURIComponent(embedUrl)}`;
                iframe.src = proxyUrl;
            };
        }

        // Check if URL parameter exists on page load
        const params = new URLSearchParams(window.location.search);
        const encodedUrl = params.get('url');
        
        if (encodedUrl) {
            const decodedUrl = decodeUrl(encodedUrl);
            if (decodedUrl) {
                try {
                    new URL(decodedUrl);
                    loadStream(decodedUrl);
                } catch (e) {
                    document.body.innerHTML = '<div class="error"><h2>❌ Invalid URL</h2></div>';
                }
            } else {
                document.body.innerHTML = '<div class="error"><h2>❌ Invalid URL</h2></div>';
            }
        }

        // Allow Enter key
        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                encodeAndLoad();
            }
        });
    </script>
</body>
</html>

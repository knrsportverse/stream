<!DOCTYPE html>
<html>
<head>
    <title>Embed Viewer</title>
    <style>
        * { margin: 0; padding: 0; }
        body { background: #1a1a1a; font-family: Arial; }
        .container { width: 100%; height: 100vh; display: flex; flex-direction: column; }

        iframe { flex: 1; border: none; }
        .error { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; background: #2d2d2d; color: #fff; text-align: center; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <iframe id="viewer" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const embedUrl = params.get('url');
        const iframe = document.getElementById('viewer');

        if (!embedUrl) {
            document.body.innerHTML = '<div class="error"><h2>❌ Error</h2><p>No URL parameter provided</p><p>Usage: ?url=https://example.com</p></div>';
        } else {
            try {
                new URL(embedUrl);
                
                iframe.src = embedUrl;

                let loaded = false;
                iframe.onload = () => {
                    loaded = true;
                    
                    // Hide text and links in iframe
                    try {
                        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                        if (iframeDoc) {
                            const style = document.createElement('style');
                            style.textContent = `* { color: transparent !important; } a, button { pointer-events: none !important; }`;
                            iframeDoc.head.appendChild(style);
                        }
                    } catch (e) {}
                    
                    // Block redirects
                    try {
                        iframe.contentWindow.history.pushState = function() {};
                        Object.defineProperty(iframe.contentWindow, 'location', { writable: false });
                        iframe.contentWindow.onbeforeunload = null;
                    } catch (e) {}
                };

                setTimeout(() => {
                    if (!loaded) {
                        const proxyUrl = `https://cors.sh/?${encodeURIComponent(embedUrl)}`;
                        iframe.src = proxyUrl;
                    }
                }, 5000);

                iframe.onerror = () => {
                    const proxyUrl = `https://cors.sh/?${encodeURIComponent(embedUrl)}`;
                    iframe.src = proxyUrl;
                };

            } catch (e) {
                document.body.innerHTML = '<div class="error"><h2>❌ Invalid URL</h2></div>';
            }
        }
    </script>
</body>
</html>

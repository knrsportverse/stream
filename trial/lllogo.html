<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KNR SPORTVERSE - STREAM</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 60'><defs><linearGradient id='grad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='%231D4ED8'/><stop offset='100%' stop-color='%2360A5FA'/></linearGradient></defs><rect x='4' y='4' width='52' height='52' rx='12' fill='url(%23grad)' stroke='white' stroke-width='1.5'/><text x='30' y='38' text-anchor='middle' font-family='Arial,sans-serif' font-size='22' font-weight='700' fill='white'>KNR</text></svg>">
  
  <!-- Shaka Player -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .shaka-video-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    video {
      width: 100%;
      height: 100%;
      background: #000;
      object-fit: contain;
    }

    .shaka-spinner-container,
    .shaka-spinner,
    .shaka-spinner-svg {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
    }

    /* Blue Controls & Icons */
    .shaka-controls-button,
    .shaka-overflow-button-label,
    .shaka-current-time,
    .shaka-time-container {
      color: dark-blue !important;
    }

    .shaka-controls-button svg path {
      fill: #1e90ff !important;
    }

    /* Logo overlay */
    .video-logo {
      position: fixed;
      top: 15px;
      right: 15px;
      z-index: 999999;
      pointer-events: auto;
      transition: opacity 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-logo img {
      height: 35px;
      border-radius: 4px;
      opacity: 0.85;
      display: block;
      transition: opacity 0.3s ease;
      max-width: 100%;
      object-fit: contain;
    }

    .video-logo:hover img {
      opacity: 1;
    }

    /* Responsive sizing for different screen sizes */
    @media (max-width: 480px) {
      .video-logo {
        top: 10px;
        right: 10px;
      }

      .video-logo img {
        height: 28px;
      }
    }

    @media (max-width: 320px) {
      .video-logo {
        top: 8px;
        right: 8px;
      }

      .video-logo img {
        height: 24px;
      }
    }

    @media (min-width: 768px) {
      .video-logo {
        top: 20px;
        right: 20px;
      }

      .video-logo img {
        height: 40px;
      }
    }

    @media (min-width: 1200px) {
      .video-logo {
        top: 25px;
        right: 25px;
      }

      .video-logo img {
        height: 45px;
      }
    }

    /* Logo inside fullscreen element */
    .video-logo-fullscreen {
      position: fixed;
      top: 15px;
      right: 15px;
      z-index: 999999;
      pointer-events: auto;
    }

    .video-logo-fullscreen img {
      height: 35px;
      border-radius: 4px;
      opacity: 0.85;
      display: block;
      max-width: 100%;
      object-fit: contain;
    }

    .video-logo-fullscreen:hover img {
      opacity: 1;
    }

    /* Hide original logo during fullscreen */
    body.fs-active .video-logo {
      display: none !important;
    }
  </style>
</head>

<body>
  <!-- Logo - Always on top -->
  <div class="video-logo" id="mainLogo">
    <img src="https://i.postimg.cc/bwr7p6LM/knrsportverse.png" alt="KNR Sportverse Logo">
  </div>

  <div class="shaka-video-container" data-shaka-player id="videoContainer">
    <video autoplay muted playsinline preload="metadata" poster="" id="mainVideo">
    </video>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      shaka.polyfill.installAll();

      if (!shaka.Player.isBrowserSupported()) {
        console.error('Browser not supported');
        return;
      }

      const video = document.getElementById('mainVideo');
      const logo = document.getElementById('mainLogo');
      const container = document.getElementById('videoContainer');
      const player = new shaka.Player();
      await player.attach(video);

      const ui = new shaka.ui.Overlay(player, container, video);

      // Blue / Sky Controls
      ui.configure({
        controlPanelElements: [
          'play_pause', 'mute', 'volume', 'time_and_duration',
          'spacer', 'language', 'captions', 'picture_in_picture',
          'quality', 'fullscreen'
        ],
        volumeBarColors: {
          base: 'rgba(135, 206, 235, 0.35)',
          level: 'rgb(255,255,255)'
        },
        seekBarColors: {
          base: 'rgba(50, 55, 61)',
          buffered: 'rgba(135, 206, 235, 0.6)',
          played: 'rgb(255, 255, 255)'
        }
      });

      // DRM Config
      const drmConfig = {
        clearKeys: {
          "1c6bfd8d1cdd4df69ea5fc4dd2f025bb": "b6fd90027dac7a94a9461f8b2638cbb4"
        }
      };
      
      let streamUrl = "https://dmbgaz4xf6jyh.cloudfront.net/live-stream-dai/69690cfcce0dc031830e7c1a/123a264b71764485bd49eca2d552cf33/d97743de3620a865848fff7a9de14dda1bf2409d/session/3200a220-9ac8-4aef-9696-29c0c79b3d98/manifest.mpd?aid=688aae6d61c87d6274c05065&dnt=true&access_token=63ey9SOpQeHBRfWJYQLXQjelQc0QM1HXmlHp4iZrH8UCOCM8QtGIGg1sEEPJH0R0yXktUEXdLeB&uid=Knx65GY6UbaWSADZybEvf6m5MvqNIuNs&sid=bwRy9BgSc4RFeVhYh52hVIY8uPsJ4v4d&pid=A0xT1VnepBvKKqyeyRNtNkZBmHBrNNZM&ref=ditu.caracoltv.com&ext_pb=0&es=dmbgaz4xf6jyh.cloudfront.net&proto=https&pz=us&xr=us-east-2&manifestfilter=video_height:480-1080";

      player.configure({
        drm: drmConfig,
        streaming: {
          lowLatencyMode: true,
          bufferingGoal: 15,
          rebufferingGoal: 2,
          bufferBehind: 15,
          retryParameters: {
            timeout: 10000,
            maxAttempts: 5,
            baseDelay: 300,
            backoffFactor: 1.2
          },
          segmentRequestTimeout: 8000,
          segmentPrefetchLimit: 2,
          useNativeHlsOnSafari: true
        },
        manifest: {
          retryParameters: { timeout: 8000, maxAttempts: 3 }
        }
      });

      player.addEventListener('error', (event) => {
        console.error('Shaka Player Error:', event.detail);
      });

      try {
        await player.load(streamUrl);
        console.log("Stream loaded successfully");

        // 🔥 FORCE AUTOPLAY
        video.muted = true;
        const playPromise = video.play();
        if (playPromise !== undefined) {
          playPromise.catch(err => console.log("Autoplay blocked:", err));
        }

      } catch (error) {
        console.error('Load error:', error);
      }

      // Optional: Unmute on first click
      document.addEventListener('click', () => {
        if (video.muted) {
          video.muted = false;
          video.volume = 1;
        }
      }, { once: true });

      // ============================================
      // 🎯 FULLSCREEN LOGO HANDLING - ADVANCED
      // ============================================

      let fullscreenLogoClone = null;

      // Create a clone logo for fullscreen
      function createFullscreenLogo() {
        if (!fullscreenLogoClone) {
          fullscreenLogoClone = document.createElement('div');
          fullscreenLogoClone.className = 'video-logo-fullscreen';
          fullscreenLogoClone.innerHTML = '<img src="https://i.postimg.cc/bwr7p6LM/knrsportverse.png" alt="KNR Sportverse Logo">';
        }
        return fullscreenLogoClone;
      }

      // Function to append logo to fullscreen element
      function addLogoToFullscreenElement() {
        setTimeout(() => {
          const fullscreenElement = document.fullscreenElement || 
                                   document.webkitFullscreenElement || 
                                   document.mozFullScreenElement || 
                                   document.msFullscreenElement;
          
          if (fullscreenElement && fullscreenElement === video) {
            console.log("✅ Fullscreen detected - appending logo");
            
            // Remove existing fullscreen logo if any
            const existingLogo = fullscreenElement.querySelector('.video-logo-fullscreen');
            if (existingLogo) {
              existingLogo.remove();
            }
            
            // Create and append new logo
            const cloneLogo = createFullscreenLogo();
            fullscreenElement.appendChild(cloneLogo);
            document.body.classList.add('fs-active');
            
            // Make sure logo is visible
            cloneLogo.style.display = 'flex';
            cloneLogo.style.visibility = 'visible';
            cloneLogo.style.opacity = '1';
            
            console.log("✅ Logo appended to fullscreen element");
          }
        }, 100);
      }

      // Function to remove logo from fullscreen
      function removeLogoFromFullscreen() {
        setTimeout(() => {
          if (fullscreenLogoClone && fullscreenLogoClone.parentElement) {
            fullscreenLogoClone.remove();
            console.log("✅ Logo removed from fullscreen");
          }
          document.body.classList.remove('fs-active');
        }, 100);
      }

      // Standard fullscreen API
      document.addEventListener('fullscreenchange', () => {
        if (document.fullscreenElement) {
          addLogoToFullscreenElement();
        } else {
          removeLogoFromFullscreen();
        }
      });

      // WebKit fullscreen
      document.addEventListener('webkitfullscreenchange', () => {
        if (document.webkitFullscreenElement) {
          addLogoToFullscreenElement();
        } else {
          removeLogoFromFullscreen();
        }
      });

      // Mozilla fullscreen
      document.addEventListener('mozfullscreenchange', () => {
        if (document.mozFullScreenElement) {
          addLogoToFullscreenElement();
        } else {
          removeLogoFromFullscreen();
        }
      });

      // MS fullscreen
      document.addEventListener('msfullscreenchange', () => {
        if (document.msFullscreenElement) {
          addLogoToFullscreenElement();
        } else {
          removeLogoFromFullscreen();
        }
      });

      // Monitor for dynamic fullscreen changes
      let currentFullscreenElement = null;
      setInterval(() => {
        const fsElement = document.fullscreenElement || 
                         document.webkitFullscreenElement || 
                         document.mozFullScreenElement || 
                         document.msFullscreenElement;
        
        if (fsElement && fsElement !== currentFullscreenElement) {
          currentFullscreenElement = fsElement;
          addLogoToFullscreenElement();
        } else if (!fsElement && currentFullscreenElement) {
          currentFullscreenElement = null;
          removeLogoFromFullscreen();
        }
      }, 200);

      console.log("✅ Fullscreen logo system initialized");
    });
  </script>
</body>
</html>

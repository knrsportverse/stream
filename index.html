<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KNR Stream</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#000;
    color:#fff;
    font-family:Arial,sans-serif;
}

#permission,
#admin,
#player{
    width:100%;
    height:100%;
    display:none;
}

#permission{
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
}

#admin{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    gap:20px;
}

input{
    width:80%;
    max-width:700px;
    padding:15px;
    font-size:18px;
    border:none;
    outline:none;
    border-radius:8px;
}

button{
    padding:14px 30px;
    font-size:18px;
    cursor:pointer;
}

iframe{
    width:100%;
    height:100%;
    border:none;
    background:#000;
}
</style>
</head>

<body>

<div id="permission">
    You have no permission to view this page.
</div>

<div id="admin">
    <h2>Enter iframe URL</h2>

    <input
        id="iframeUrl"
        placeholder="https://example.com/embed">

    <button onclick="playStream()">Play</button>
</div>

<div id="player">
    <iframe
        id="frame"
        allowfullscreen
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-presentation"
        referrerpolicy="no-referrer">
    </iframe>
</div>

<script>

const permission=document.getElementById("permission");
const admin=document.getElementById("admin");
const player=document.getElementById("player");
const frame=document.getElementById("frame");

const params=new URLSearchParams(window.location.search);
const url=params.get("url");

if(!url){

    permission.style.display="flex";

}
else if(url==="live"){

    admin.style.display="flex";

}
else{

    player.style.display="block";

    frame.src=decodeURIComponent(url);

}

function playStream(){

    const stream=document.getElementById("iframeUrl").value.trim();

    if(stream===""){
        alert("Enter iframe URL");
        return;
    }

    location.href="?url="+encodeURIComponent(stream);

}

/* Optional protections */

document.addEventListener("contextmenu",e=>e.preventDefault());

document.addEventListener("dragstart",e=>e.preventDefault());

document.addEventListener("selectstart",e=>e.preventDefault());

window.addEventListener("beforeunload",e=>{
    e.stopPropagation();
});

document.addEventListener("keydown",function(e){

    if(e.key==="F12") e.preventDefault();

    if(e.ctrlKey && e.shiftKey &&
        ["I","J","C"].includes(e.key.toUpperCase()))
        e.preventDefault();

    if(e.ctrlKey && e.key.toUpperCase()==="U")
        e.preventDefault();

});

</script>

</body>
</html>

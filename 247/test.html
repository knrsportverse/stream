<html>
<head>
  <title>KNR SPORTVERSE - STREAM</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 60'><defs><linearGradient id='grad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='%231D4ED8'/><stop offset='100%' stop-color='%2360A5FA'/></linearGradient></defs><rect x='4' y='4' width='52' height='52' rx='12' fill='url(%23grad)' stroke='white' stroke-width='1.5'/><text x='30' y='38' text-anchor='middle' font-family='Arial,sans-serif' font-size='22' font-weight='700' fill='white'>KNR</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #player { position: fixed; inset: 0; z-index: 1; background: #000; }
    #player > div { width: 100% !important; height: 100% !important; }
    
    /* Unmute Button (Top Left) */
    .unmute-btn { position: fixed; top: 20px; left: 20px; z-index: 20; display: none; align-items: center; gap: 10px; padding: 14px 24px; border-radius: 50px; background: rgba(255,255,255,0.15); color: #fff; font-weight: 600; font-size: 14px; cursor: pointer; border: 1px solid rgba(255,255,255,0.25); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); transition: all 0.25s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .unmute-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); box-shadow: 0 6px 25px rgba(0,0,0,0.4); }
    .unmute-btn:active { transform: scale(0.98); }
    .unmute-btn svg { width: 20px; height: 20px; fill: currentColor; }

    /* Discord Button (Top Right)*/
    .discord-btn { 
      position: fixed; 
      top: 20px; 
      right: 20px; 
      z-index: 20; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 50%; 
      background: rgba(255,255,255,0.15); 
      color: #fff; 
      text-decoration: none; 
      border: 1px solid rgba(255,255,255,0.25); 
      backdrop-filter: blur(12px); 
      -webkit-backdrop-filter: blur(12px); 
      transition: all 0.25s ease; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.3); 
    }
    .discord-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); box-shadow: 0 6px 25px rgba(0,0,0,0.4); color: #fff; }
    .discord-btn:hover i { color: #5865F2; transition: color 0.25s; }
    .discord-btn:active { transform: scale(0.98); }
    .discord-btn i { font-size: 22px; }
    
    * { -webkit-user-select: none !important; -moz-user-select: none !important; -ms-user-select: none !important; user-select: none !important; -webkit-touch-callout: none !important; }
    @media print { * { display: none !important; } }
    img { pointer-events: none; -webkit-user-drag: none; user-drag: none; }
  </style>
  
  <!-- Icon-->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://cdn.jsdelivr.net/npm/swarmcloud-jwplayer-hlsjs@latest/dist/jwplayer.hlsjs.min.js"></script>
  <script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@swarmcloud/hls/hls.min.js"></script>
  <script async src="https://plausible.io/js/pa-03ka4Ld1T0ztqRirRQHhI.js"></script>
  <script>
    window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
    plausible.init()
  </script>
</head>
<body>

  <div id="player" data-id="sonysportsnetwork-in"></div>

  <!-- Unmute Button -->
  <div id="unmuteBtn" class="unmute-btn" role="button" aria-label="Unmute video">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
    </svg>
    <span>Click to Unmute</span>
  </div>

  <!-- Discord Button-->
  <a href="https://discord.com/invite/Q57TTcAuYu" target="_blank" class="discord-btn" aria-label="Join Discord">
    <i class="fa-brands fa-discord"></i>
  </a>

  <!--SCRIPT-->
<script>
  function init() {
  var playerEl = document.getElementById('player');
  var ID = playerEl.getAttribute('data-id');
  
  if (ID) {
    var player = null;
    var refreshTimer = null;
    
    // Fetch fresh token/timestamp from existing backend
    async function getFreshCredentials() {
      try {
        // Try to fetch from the backend that already exists
        const response = await fetch(`https://fiveo4.casadenoval.uk/main/token?streamId=${ID}`);
        
        if (!response.ok) throw new Error('Failed to get token');
        
        const data = await response.json();
        // Response format: { token, timestamp } or { url }
        
        const signedUrl = data.url || `https://fiveo4.casadenoval.uk/main/secure/${data.token}/${data.timestamp}/${ID}.m3u8`;
        
        return {
          signedUrl: signedUrl,
          token: data.token,
          timestamp: data.timestamp
        };
      } catch (error) {
        console.error('Error fetching fresh credentials:', error);
        return null;
      }
    }
    
    // Load stream with fresh credentials
    async function loadStream() {
      const credentials = await getFreshCredentials();
      
      if (!credentials) {
        console.error('Could not get credentials from backend');
        return false;
      }
      
      var setupOpts = {
        file: credentials.signedUrl,
        type: "hls",
        width: "100%",
        height: "100%",
        stretching: "uniform",
        autostart: true,
        mute: true,
        cast: {},
      };
      
      var p2pConfig = {
        live: true,
        token: credentials.token,  // ✅ Fresh from backend
        channelId: "timstreams-" + ID,
        announce: "https://ann.cdn-lab.shop/v1",
        sharePlaylist: true,
        startFromSegmentOffset: 0,
        trickleICE: true
      };
      
      try {
        if (typeof Hls !== 'undefined' && Hls.P2PEngine && !Hls.P2PEngine.isMSESupported()) {
          new Hls.P2PEngine.ServiceWorkerEngine({ 
            swFile: '/sw.js', 
            live: true, 
            token: credentials.token  // ✅ Fresh from backend
          });
        }
      } catch (e) {}
      
      setupOpts.hlsjsdefault = true;
      setupOpts.hlsjsConfig = { p2pConfig: p2pConfig };
      
      if (!player) {
        player = jwplayer("player");
      }
      
      try {
        if (typeof Hls !== 'undefined' && Hls.P2PEngine && Hls.P2PEngine.tryRegisterServiceWorker) {
          Hls.P2PEngine.tryRegisterServiceWorker(p2pConfig);
        }
      } catch (e) {}
      
      try { if (typeof jwplayer_hls_provider !== 'undefined') jwplayer_hls_provider.attach(); } catch (e) {}
      
      player.setup(setupOpts);
      
      var unmuteBtn = document.getElementById('unmuteBtn');
      player.on('play', function() {
        if (player.getMute() || player.getVolume() === 0) { 
          unmuteBtn.style.display = 'flex'; 
        }
      });
      
      unmuteBtn.addEventListener('click', function() {
        player.setMute(false);
        player.setVolume(100);
        unmuteBtn.style.display = 'none';
      });
      
      // Refresh token every 30 minutes
      scheduleRefresh();
      
      return true;
    }
    
    // Auto refresh every 30 minutes
    function scheduleRefresh() {
      if (refreshTimer) clearTimeout(refreshTimer);
      
      refreshTimer = setTimeout(async function() {
        console.log('Refreshing token...');
        const credentials = await getFreshCredentials();
        
        if (credentials && player) {
          player.load({ 
            file: credentials.signedUrl, 
            type: 'hls' 
          });
          player.play();
        }
        
        scheduleRefresh(); // Schedule next refresh
      }, 30 * 60 * 1000); // 30 minutes
    }
    
    // Start
    if (typeof jwplayer !== 'undefined') {
      loadStream();
    } else {
      var jwWaitStart = Date.now();
      var jwWaitTimer = setInterval(function() {
        if (typeof jwplayer !== 'undefined') {
          clearInterval(jwWaitTimer);
          loadStream();
        } else if (Date.now() - jwWaitStart > 15000) {
          clearInterval(jwWaitTimer);
          console.error("JW Player failed to load in time.");
        }
      }, 50);
    }
  } else {
    console.error("No stream ID found in the URL.");
  }
}
</script>
  <!--KNR SPORTVERSE-->

</body>
